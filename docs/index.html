<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Trends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // Wait for React to be available
    function initApp() {
      if (!window.React || !window.ReactDOM) {
        setTimeout(initApp, 100);
        return;
      }

      const { useState } = window.React;
      const root = window.ReactDOM.createRoot(document.getElementById('root'));

      const CATEGORIES = [
        "Technology & AI", "Business & Economy", "Science & Health",
        "Culture & Society", "Politics & Geopolitics", "Environment & Climate"
      ];

      const CATEGORY_COLORS = {
        "Technology & AI":        { accent: "#38bdf8", pill: "#0ea5e9" },
        "Business & Economy":     { accent: "#34d399", pill: "#10b981" },
        "Science & Health":       { accent: "#a78bfa", pill: "#8b5cf6" },
        "Culture & Society":      { accent: "#fb923c", pill: "#f97316" },
        "Politics & Geopolitics": { accent: "#f472b6", pill: "#ec4899" },
        "Environment & Climate":  { accent: "#4ade80", pill: "#22c55e" },
      };

      function DailyTrendsApp() {
        const [trends, setTrends] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [generatedAt, setGeneratedAt] = useState(null);
        const [filter, setFilter] = useState("All");
        const [expandedId, setExpandedId] = useState(null);

        const today = new Date().toLocaleDateString("en-US", {
          weekday: "long", year: "numeric", month: "long", day: "numeric"
        });

        const fetchTrends = async () => {
          setLoading(true);
          setError(null);
          setTrends([]);
          setExpandedId(null);

          try {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 8000,
                messages: [
                  {
                    role: "user",
                    content: `Today is ${new Date().toDateString()}. You are a global trends analyst. Identify the top 20 most significant global trends happening right now across technology, business, science, culture, politics, and climate.

RETURN ONLY A VALID JSON ARRAY. NO BACKTICKS. NO MARKDOWN. NO TEXT BEFORE OR AFTER.

[{"rank":1,"title":"specific title","category":"Technology & AI","momentum":"Rising","summary":"Two sentence summary.","impact":8,"regions":["North America"],"insight":"Surprising fact."}]

Categories: Technology & AI | Business & Economy | Science & Health | Culture & Society | Politics & Geopolitics | Environment & Climate
Momentum: Rising | Peaking | Shifting`
                  }
                ]
              }),
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            if (data.error) {
              throw new Error(data.error.message);
            }

            if (!data.content || !data.content.length) {
              throw new Error("No content in response");
            }

            const textContent = data.content.find(b => b.type === "text");
            if (!textContent) {
              throw new Error("No text in response");
            }

            const text = textContent.text;
            const cleaned = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
            const start = cleaned.indexOf("[");
            const end = cleaned.lastIndexOf("]");

            if (start === -1 || end === -1) {
              throw new Error("No JSON array in response");
            }

            const parsed = JSON.parse(cleaned.slice(start, end + 1));

            if (!Array.isArray(parsed) || parsed.length === 0) {
              throw new Error("Empty or invalid array");
            }

            setTrends(parsed);
            setGeneratedAt(new Date());
          } catch (e) {
            setError(e.message);
          } finally {
            setLoading(false);
          }
        };

        const filtered = filter === "All" ? trends : trends.filter(t => t.category === filter);

        const getMomentumIcon = m => {
          if (m === "Rising") return "↑";
          if (m === "Peaking") return "◆";
          return "→";
        };

        const getMomentumColor = m => {
          if (m === "Rising") return "#4ade80";
          if (m === "Peaking") return "#facc15";
          return "#94a3b8";
        };

        return window.React.createElement(
          "div",
          { style: {
            minHeight: "100vh",
            background: "linear-gradient(135deg, #020617 0%, #0f172a 50%, #0c1a2e 100%)",
            color: "#f1f5f9",
            fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
          }},
          window.React.createElement("div", { style: {
            borderBottom: "1px solid #1e293b",
            padding: "20px 24px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            background: "rgba(15,23,42,0.9)",
            position: "sticky",
            top: 0,
            zIndex: 100,
            flexWrap: "wrap",
            gap: "12px",
          }},
            window.React.createElement("div", null,
              window.React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "8px" }},
                window.React.createElement("span", { style: { fontSize: "20px" }}, "🌍"),
                window.React.createElement("span", { style: { fontSize: "18px", fontWeight: "800" }}, "Global Trends"),
                window.React.createElement("span", { style: { background: "#1e3a5f", color: "#38bdf8", fontSize: "10px", fontWeight: "700", padding: "2px 7px", borderRadius: "20px" }}, "DAILY")
              ),
              window.React.createElement("div", { style: { color: "#475569", fontSize: "12px", marginTop: "2px" }}, today)
            ),
            window.React.createElement("button", {
              onClick: fetchTrends,
              disabled: loading,
              style: {
                background: loading ? "#1e293b" : "linear-gradient(135deg, #0ea5e9, #6366f1)",
                color: loading ? "#475569" : "#fff",
                border: "none",
                padding: "10px 20px",
                borderRadius: "9px",
                fontSize: "13px",
                fontWeight: "700",
                cursor: loading ? "not-allowed" : "pointer",
              }
            },
              loading ? "Researching..." : trends.length > 0 ? "↻ Refresh" : "⚡ Generate"
            )
          ),

          window.React.createElement("div", { style: { padding: "20px 24px", maxWidth: "1000px", margin: "0 auto" }},
            !loading && trends.length === 0 && !error && window.React.createElement("div", { style: { textAlign: "center", padding: "60px 20px" }},
              window.React.createElement("div", { style: { fontSize: "56px", marginBottom: "16px" }}, "🔭"),
              window.React.createElement("h2", { style: { fontSize: "22px", fontWeight: "800", margin: "0 0 10px" }}, "What's shaping the world today?"),
              window.React.createElement("p", { style: { color: "#64748b", fontSize: "14px", maxWidth: "400px", margin: "0 auto 24px", lineHeight: "1.6" }},
                "Click Generate for the top 20 global trends ranked by impact."
              ),
              window.React.createElement("div", { style: { display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }},
                CATEGORIES.map(c =>
                  window.React.createElement("span", { key: c, style: { background: "#1e293b", color: "#64748b", padding: "5px 12px", borderRadius: "20px", fontSize: "12px" }}, c)
                )
              )
            ),

            loading && window.React.createElement("div", { style: { textAlign: "center", padding: "60px 20px" }},
              window.React.createElement("div", { style: { width: "48px", height: "48px", border: "3px solid #1e293b", borderTop: "3px solid #38bdf8", borderRadius: "50%", margin: "0 auto 20px", animation: "spin 1s linear infinite" }}),
              window.React.createElement("style", null, "@keyframes spin { to { transform: rotate(360deg); } }"),
              window.React.createElement("p", { style: { color: "#38bdf8", fontSize: "15px", fontWeight: "600" }}, "Analysing global signals..."),
              window.React.createElement("p", { style: { color: "#475569", fontSize: "12px", marginTop: "6px" }}, "This takes 15–20 seconds")
            ),

            error && window.React.createElement("div", { style: { background: "#1c0a0a", border: "1px solid #7f1d1d", borderRadius: "10px", padding: "16px 20px", color: "#fca5a5", marginBottom: "20px" }},
              window.React.createElement("div", { style: { fontWeight: "700", marginBottom: "4px" }}, "⚠️ Error"),
              window.React.createElement("div", { style: { fontSize: "13px", lineHeight: "1.5", wordBreak: "break-word" }}, error)
            ),

            trends.length > 0 && window.React.createElement(window.React.Fragment, null,
              window.React.createElement("div", { style: { display: "flex", gap: "6px", marginBottom: "16px", flexWrap: "wrap", alignItems: "center", justifyContent: "space-between" }},
                window.React.createElement("div", { style: { display: "flex", gap: "5px", flexWrap: "wrap" }},
                  ["All", ...CATEGORIES].map(cat =>
                    window.React.createElement("button", {
                      key: cat,
                      onClick: () => setFilter(cat),
                      style: {
                        background: filter === cat ? "#1e3a5f" : "transparent",
                        border: filter === cat ? "1px solid #38bdf8" : "1px solid #1e293b",
                        color: filter === cat ? "#38bdf8" : "#64748b",
                        padding: "4px 10px",
                        borderRadius: "20px",
                        fontSize: "11px",
                        fontWeight: "600",
                        cursor: "pointer",
                      }
                    },
                      cat === "All" ? `All (${trends.length})` : cat.split(" & ")[0]
                    )
                  )
                ),
                generatedAt && window.React.createElement("span", { style: { color: "#475569", fontSize: "11px" }}, "Updated " + generatedAt.toLocaleTimeString())
              ),

              window.React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "8px" }},
                filtered.map(trend => {
                  const colors = CATEGORY_COLORS[trend.category] || CATEGORY_COLORS["Technology & AI"];
                  const isExpanded = expandedId === trend.rank;

                  return window.React.createElement("div", {
                    key: trend.rank,
                    onClick: () => setExpandedId(isExpanded ? null : trend.rank),
                    style: {
                      background: "#0f172a",
                      border: `1px solid ${isExpanded ? colors.accent + "55" : "#1e293b"}`,
                      borderLeft: `3px solid ${colors.accent}`,
                      borderRadius: "10px",
                      padding: "14px 16px",
                      cursor: "pointer",
                    }
                  },
                    window.React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "10px" }},
                      window.React.createElement("span", { style: { fontSize: "11px", fontWeight: "800", color: "#334155", minWidth: "22px", textAlign: "right" }}, `#${trend.rank}`),
                      window.React.createElement("div", { style: { flex: 1, minWidth: 0 }},
                        window.React.createElement("div", { style: { fontWeight: "700", fontSize: "14px", color: "#f1f5f9", lineHeight: "1.3" }}, trend.title),
                        !isExpanded && window.React.createElement("div", { style: { color: "#64748b", fontSize: "12px", marginTop: "3px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}, trend.summary)
                      ),
                      window.React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "5px", flexShrink: 0 }},
                        window.React.createElement("span", { style: { background: colors.pill + "22", color: colors.accent, fontSize: "10px", fontWeight: "700", padding: "2px 7px", borderRadius: "20px" }}, trend.category?.split(" & ")[0]),
                        window.React.createElement("span", { style: { color: getMomentumColor(trend.momentum), fontSize: "13px", fontWeight: "700" }}, getMomentumIcon(trend.momentum)),
                        window.React.createElement("span", { style: { background: "#1e293b", color: trend.impact >= 8 ? "#fbbf24" : "#94a3b8", fontSize: "11px", fontWeight: "800", padding: "2px 6px", borderRadius: "5px" }}, `${trend.impact}/10`),
                        window.React.createElement("span", { style: { color: "#334155", fontSize: "12px" }}, isExpanded ? "▲" : "▼")
                      )
                    ),
                    isExpanded && window.React.createElement("div", { style: { marginTop: "12px", paddingTop: "12px", borderTop: "1px solid #1e293b", marginLeft: "32px" }},
                      window.React.createElement("p", { style: { color: "#94a3b8", fontSize: "13px", lineHeight: "1.6", margin: "0 0 10px" }}, trend.summary),
                      window.React.createElement("div", { style: { display: "flex", gap: "10px", flexWrap: "wrap" }},
                        window.React.createElement("div", { style: { background: "#0f1e33", border: "1px solid #1e3a5f", borderRadius: "8px", padding: "10px 12px", flex: 1, minWidth: "160px" }},
                          window.React.createElement("div", { style: { color: "#38bdf8", fontSize: "10px", fontWeight: "700", marginBottom: "4px" }}, "💡 INSIGHT"),
                          window.React.createElement("div", { style: { color: "#94a3b8", fontSize: "12px", lineHeight: "1.5" }}, trend.insight)
                        ),
                        trend.regions?.length > 0 && window.React.createElement("div", { style: { background: "#0f1e33", border: "1px solid #1e293b", borderRadius: "8px", padding: "10px 12px" }},
                          window.React.createElement("div", { style: { color: "#64748b", fontSize: "10px", fontWeight: "700", marginBottom: "6px" }}, "🌐 REGIONS"),
                          window.React.createElement("div", { style: { display: "flex", gap: "5px", flexWrap: "wrap" }},
                            trend.regions.map(r =>
                              window.React.createElement("span", { key: r, style: { background: "#1e293b", color: "#94a3b8", fontSize: "11px", padding: "2px 6px", borderRadius: "4px" }}, r)
                            )
                          )
                        )
                      )
                    )
                  );
                })
              )
            )
          )
        );
      }

      root.render(window.React.createElement(DailyTrendsApp));
    }

    // Start app when React is loaded
    initApp();
  </script>
</body>
</html>
